<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Dialectica logical block graph</title>
  <desc id="desc">A stylized graph of typed semantic blocks connected by reasoning relations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#17211f"/>
      <stop offset="1" stop-color="#243b35"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#2f9f83"/>
      <stop offset="1" stop-color="#d4a33f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f1715" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="960" height="600" fill="url(#bg)"/>
  <path d="M0 455 C180 370 304 468 470 384 C648 294 738 326 960 238 L960 600 L0 600 Z" fill="#2f9f83" opacity="0.14"/>
  <path d="M116 112 H844" stroke="#f7f8f4" stroke-opacity="0.08" stroke-width="2"/>
  <path d="M116 488 H844" stroke="#f7f8f4" stroke-opacity="0.08" stroke-width="2"/>
  <g filter="url(#shadow)">
    <rect x="116" y="98" width="244" height="104" rx="18" fill="#f7f8f4"/>
    <rect x="592" y="98" width="252" height="104" rx="18" fill="#f7f8f4"/>
    <rect x="350" y="248" width="260" height="104" rx="18" fill="#f7f8f4"/>
    <rect x="116" y="398" width="244" height="104" rx="18" fill="#f7f8f4"/>
    <rect x="592" y="398" width="252" height="104" rx="18" fill="#f7f8f4"/>
  </g>
  <g fill="none" stroke="url(#accent)" stroke-linecap="round" stroke-width="10">
    <path d="M360 150 C420 148 430 242 480 248"/>
    <path d="M592 150 C536 150 528 238 480 248"/>
    <path d="M480 352 C434 368 408 434 360 450"/>
    <path d="M480 352 C532 364 544 436 592 450"/>
  </g>
  <g font-family="Source Sans Pro, Arial, sans-serif">
    <g fill="#17211f">
      <text x="148" y="141" font-size="30" font-weight="700">claim</text>
      <text x="148" y="176" font-size="22" fill="#62716c">source text</text>
      <text x="624" y="141" font-size="30" font-weight="700">constraint</text>
      <text x="624" y="176" font-size="22" fill="#62716c">context</text>
      <text x="382" y="291" font-size="30" font-weight="700">logical form</text>
      <text x="382" y="326" font-size="22" fill="#62716c">canonical graph</text>
      <text x="148" y="441" font-size="30" font-weight="700">retrieval</text>
      <text x="148" y="476" font-size="22" fill="#62716c">similarity</text>
      <text x="624" y="441" font-size="30" font-weight="700">agent</text>
      <text x="624" y="476" font-size="22" fill="#62716c">reasoning layer</text>
    </g>
    <text x="116" y="565" fill="#f7f8f4" font-size="52" font-weight="700">Dialectica</text>
    <text x="408" y="565" fill="#f7f8f4" fill-opacity="0.72" font-size="24">natural language to typed logical blocks</text>
  </g>
</svg>
